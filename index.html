<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f2f2f7">
  <title>提醒事项</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar Overlay (mobile) -->
    <div id="sidebar-overlay" onclick="App.closeSidebar()"></div>

    <!-- Sidebar -->
    <nav id="sidebar"></nav>

    <!-- Main Content -->
    <main id="main-content">
      <div id="main-header">
        <button class="hamburger-btn" onclick="App.toggleSidebar()" aria-label="菜单">&#9776;</button>
        <h1 id="header-title">今天</h1>
        <div class="header-actions" id="header-actions"></div>
      </div>

      <!-- Calendar -->
      <section id="calendar-section"></section>

      <!-- Toolbar -->
      <div id="toolbar"></div>

      <!-- Tag Chips Bar -->
      <div id="tag-chips-bar" class="tag-chips-bar" style="display:none"></div>

      <!-- Quick Cards -->
      <div id="quick-cards"></div>

      <!-- Reminder List -->
      <div id="reminder-list"></div>

      <!-- New Reminder Button -->
      <button id="new-reminder-btn" onclick="Views.showNewReminderModal()">
        <span class="plus-icon">+</span> 新建提醒
      </button>
    </main>

    <!-- Detail Panel -->
    <aside id="detail-panel"></aside>

    <!-- Settings Panel -->
    <aside id="settings-panel"></aside>

    <!-- Modal Overlay -->
    <div id="modal-overlay"></div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/lists.js"></script>
  <script src="js/reminders.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/backup.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
