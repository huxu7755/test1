<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f2f2f7">
<title>提醒事项</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="header-title" id="headerTitle">提醒事项</span>
      <span class="header-count" id="headerCount"></span>
    </div>
    <div class="header-actions">
      <button class="header-btn" id="calToggleBtn" onclick="toggleCalendar()">日历</button>
      <button class="header-btn primary-btn" onclick="showNewListModal()">+ 列表</button>
    </div>
  </div>

  <!-- View Switcher -->
  <div class="view-switcher" id="viewSwitcher">
    <button class="view-tab active" data-view="today" onclick="switchView('today')">今天</button>
    <button class="view-tab" data-view="all" onclick="switchView('all')">全部</button>
    <button class="view-tab" data-view="scheduled" onclick="switchView('scheduled')">计划</button>
    <button class="view-tab" data-view="completed" onclick="switchView('completed')">完成</button>
  </div>

  <!-- Search -->
  <div class="search-wrap" id="searchWrap">
    <div class="search-bar">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" class="search-input" placeholder="搜索" id="searchInput" oninput="onSearch()">
    </div>
  </div>

  <!-- Category Tags -->
  <div class="category-tags" id="categoryTags">
    <button class="cat-tag active" data-cat="all" onclick="filterByCategory('all',this)"><span class="dot" style="background:var(--primary)"></span>全部</button>
    <button class="cat-tag" data-cat="today" onclick="filterByCategory('today',this)"><span class="dot" style="background:var(--green)"></span>今日待办</button>
    <button class="cat-tag" data-cat="important" onclick="filterByCategory('important',this)"><span class="dot" style="background:var(--red)"></span>重要且紧急</button>
    <button class="cat-tag" data-cat="flagged" onclick="filterByCategory('flagged',this)"><span class="dot" style="background:var(--yellow)"></span>旗标</button>
  </div>

  <!-- Scrollable Area -->
  <div class="scroll-area" id="scrollArea">
    <!-- Calendar -->
    <div class="calendar-wrap hidden" id="calendarPanel"></div>

    <!-- Widget Card -->
    <div class="widget-card hidden" id="widgetCard">
      <div class="widget-card-title">提醒事项</div>
      <div id="widgetContent"></div>
      <div class="widget-card-footer" id="widgetFooter"></div>
    </div>

    <!-- Lists -->
    <div id="listsSection"></div>

    <!-- Reminders -->
    <div class="reminder-list" id="reminderList"></div>

    <!-- Empty State -->
    <div class="empty-state hidden" id="emptyState">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <div class="empty-state-title">没有待办事项</div>
      <div class="empty-state-desc">点击下方 + 添加新提醒</div>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" id="fab" onclick="showNewReminderModal()">+</button>
</div>

<!-- ── New Reminder Modal ── -->
<div class="modal-overlay hidden" id="reminderModal" onclick="closeModalOutside(event,'reminderModal')">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-hd">
      <button class="modal-btn-cancel" onclick="closeModal('reminderModal')">取消</button>
      <span class="modal-hd-title" id="reminderModalTitle">新建提醒事项</span>
      <button class="modal-btn-done" onclick="saveReminder()">添加</button>
    </div>
    <div class="form-group"><input type="text" class="form-input" placeholder="标题" id="rTitle" autofocus></div>
    <div class="form-group">
      <label class="form-lbl">日期与时间</label>
      <input type="datetime-local" class="form-input" id="rDateTime">
    </div>
    <div class="form-group">
      <label class="form-lbl">地点</label>
      <input type="text" class="form-input" placeholder="添加地点" id="rLocation">
    </div>
    <div class="form-group">
      <label class="form-lbl">标签 & 列表</label>
      <div class="form-row">
        <select class="form-select" id="rTag">
          <option value="">无标签</option>
          <option value="工作">工作</option>
          <option value="个人">个人</option>
          <option value="购物">购物</option>
          <option value="健康">健康</option>
          <option value="学习">学习</option>
        </select>
        <select class="form-select" id="rList"></select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-lbl">优先级</label>
      <div class="prio-row" id="prioBtns">
        <button class="prio-btn selected" data-prio="none" onclick="selPrio(this)">无</button>
        <button class="prio-btn" data-prio="low" onclick="selPrio(this)">低</button>
        <button class="prio-btn" data-prio="medium" onclick="selPrio(this)">中</button>
        <button class="prio-btn imp" data-prio="high" onclick="selPrio(this)">!!!</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-lbl">旗标</label>
      <label style="display:flex;align-items:center;gap:10px;font-size:15px;cursor:pointer;">
        <input type="checkbox" id="rFlagged" style="width:20px;height:20px;accent-color:var(--orange);">
        标记为重要（旗标 🚩）
      </label>
    </div>
    <div class="form-group">
      <label class="form-lbl">备注</label>
      <textarea class="form-textarea" placeholder="备注..." id="rNotes"></textarea>
    </div>
    <button class="btn-full" onclick="saveReminder()">添加提醒事项</button>
    <input type="hidden" id="rEditId" value="">
  </div>
</div>

<!-- ── New List Modal ── -->
<div class="modal-overlay hidden" id="listModal" onclick="closeModalOutside(event,'listModal')">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-hd">
      <button class="modal-btn-cancel" onclick="closeModal('listModal')">取消</button>
      <span class="modal-hd-title" id="listModalTitle">新建列表</span>
      <button class="modal-btn-done" onclick="saveList()">完成</button>
    </div>
    <div class="form-group"><input type="text" class="form-input" placeholder="列表名称" id="lName"></div>
    <div class="form-group">
      <label class="form-lbl">列表类型</label>
      <select class="form-select" id="lType">
        <option value="标准">标准</option>
        <option value="购物清单">购物清单</option>
        <option value="工作">工作</option>
        <option value="学习">学习</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-lbl">颜色</label>
      <div class="color-row" id="colorRow">
        <span class="color-dot selected" data-color="#007aff" style="background:#007aff" onclick="selColor(this)"></span>
        <span class="color-dot" data-color="#ff3b30" style="background:#ff3b30" onclick="selColor(this)"></span>
        <span class="color-dot" data-color="#34c759" style="background:#34c759" onclick="selColor(this)"></span>
        <span class="color-dot" data-color="#ff9500" style="background:#ff9500" onclick="selColor(this)"></span>
        <span class="color-dot" data-color="#af52de" style="background:#af52de" onclick="selColor(this)"></span>
        <span class="color-dot" data-color="#5ac8fa" style="background:#5ac8fa" onclick="selColor(this)"></span>
        <span class="color-dot" data-color="#ffcc00" style="background:#ffcc00" onclick="selColor(this)"></span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-lbl">图标</label>
      <select class="form-select" id="lIcon">
        <option value="📋">📋 列表</option><option value="🛒">🛒 购物</option>
        <option value="💼">💼 工作</option><option value="🏠">🏠 家庭</option>
        <option value="📚">📚 学习</option><option value="❤️">❤️ 健康</option>
        <option value="⭐">⭐ 重要</option><option value="🎯">🎯 目标</option>
      </select>
    </div>
    <button class="btn-full" onclick="saveList()">创建列表</button>
    <input type="hidden" id="lEditId" value="">
  </div>
</div>

<!-- JS: 按依赖顺序加载 -->
<script src="js/storage.js"></script>
<script src="js/lists.js"></script>
<script src="js/reminders.js"></script>
<script src="js/calendar.js"></script>
<script src="js/views.js"></script>
<script src="js/app.js"></script>
</body>
</html>
